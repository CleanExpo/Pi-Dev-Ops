project: pi-dev-ops
harness_version: 1.1
agents:
  planner: {model: opus, temperature: 0.3}
  generator: {model: sonnet, temperature: 0.2, sdk: true}
  evaluator: {model: sonnet, temperature: 0.1, sdk: true, parallel: true}
qa:
  max_rounds: 3
  auto_escalate: true
sdk:
  # TAO_USE_AGENT_SDK=1 activates the claude_agent_sdk path in sessions.py.
  # When enabled, generator and evaluator try SDK first; subprocess is the fallback.
  # Phase 2 complete (RA-571/572). Phase 3 (remove fallback) tracked in RA-576.
  enabled_by_flag: TAO_USE_AGENT_SDK
  reference_impl: app/server/agents/board_meeting.py
  version_policy: .harness/agents/sdk-version-policy.md
  metrics_dir: .harness/agent-sdk-metrics/
  metrics_analyser: scripts/sdk_metrics.py
