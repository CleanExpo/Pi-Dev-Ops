project: pi-dev-ops
harness_version: 1.3
# Last updated: 2026-04-14 (RA-937 Sprint 11) — evaluator threshold 8.0→8.5, routes decomposition

# ── MODEL ROUTING POLICY (RA-1099 — hardwired 2026-04-17) ──────────────────
# OPUS-ALLOWED ROLES: Senior PM (planner) + Senior Orchestrator only.
# Every other agent runs on Sonnet 4.6 (default) or Haiku 4.5 (cost-tier).
# Enforced by config.OPUS_ALLOWED_ROLES + budget.assert_model_allowed().
agents:
  planner:      {model: opus,   temperature: 0.3}    # Senior PM        → Opus
  orchestrator: {model: opus,   temperature: 0.2}    # Senior Orchestrator → Opus
  generator:    {model: sonnet, temperature: 0.2, sdk: true}
  evaluator:    {model: sonnet, temperature: 0.1, sdk: true, parallel: true}
  board:        {model: sonnet, temperature: 0.4}    # board meeting → Sonnet
  monitor:      {model: haiku,  temperature: 0.1}    # Pi-SEO monitor → Haiku

# RA-674 — Confidence-weighted evaluator gate thresholds.
# Override per-project via TAO_EVAL_* env vars (see config.py).
evaluator_confidence:
  # Tier 1 — AUTO-SHIP FAST: score ≥ auto_ship_score AND confidence ≥ auto_ship_pct
  auto_ship_score:      9.5   # TAO_EVAL_AUTOSHIP_SCORE
  auto_ship_pct:        90    # TAO_EVAL_AUTOSHIP_CONFIDENCE (%)
  # Tier 2 — PASS: score ≥ EVALUATOR_THRESHOLD AND confidence ≥ flag_pct
  # Tier 3 — PASS + FLAG: score ≥ EVALUATOR_THRESHOLD AND confidence < flag_pct
  flag_pct:             60    # TAO_EVAL_FLAG_CONFIDENCE (%) — below triggers Telegram alert

qa:
  max_rounds: 3
  auto_escalate: true

sdk:
  # SDK-only mode as of Sprint 8 / RA-576.
  # Subprocess fallback removed from sessions.py — TAO_USE_AGENT_SDK=1 is required.
  # Setting TAO_USE_AGENT_SDK=0 raises ImportError at startup (deliberate loud failure).
  enabled_by_flag:  TAO_USE_AGENT_SDK
  fallback_removed: true      # RA-576: subprocess paths deleted
  reference_impl:   app/server/agents/board_meeting.py
  version_policy:   .harness/agents/sdk-version-policy.md
  metrics_dir:      .harness/agent-sdk-metrics/
  metrics_analyser: scripts/sdk_metrics.py

observability:
  # Supabase event logging (RA-651, RA-633)
  supabase_writer:  app/server/supabase_log.py
  tables:
    gate_checks:       "quality gate results — every /ship phase"
    alert_escalations: "critical alert tracking + escalation state"
    heartbeat_log:     "service health polls"
    triage_log:        "Pi-SEO finding triage events"
    workflow_runs:     "n8n workflow execution records"
    claude_api_costs:  "per-call token + cost tracking"

ci:
  # Three-job CI pipeline (RA-583)
  jobs:
    python:     "pytest + ruff — all branches"
    frontend:   "tsc + eslint + build — all branches"
    smoke-prod: "smoke_test.py --target=prod — main branch pushes only"
  smoke_test:   scripts/smoke_test.py
  prod_secret:  TAO_PROD_PASSWORD   # GitHub Actions secret

cron:
  # 13 active triggers — see .harness/cron-triggers.json for full list
  watchdogs:
    scheduler_silence: "12h — creates Urgent Linear ticket if no scan fires"
    docs_staleness:    "48h — creates Medium ticket if anthropic-docs/ is stale (RA-635)"
    escalations:       "30m — re-pages Telegram if critical alert unacked (RA-633)"
  quarterly:
    fallback_dryrun: "1st Jan/Apr/Jul/Oct 17:00 UTC — tests TAO_USE_FALLBACK path (RA-634)"

# RA-677 — AUTONOMY_BUDGET: single-knob pipeline configuration.
# Set TAO_AUTONOMY_BUDGET=<minutes> globally or pass budget_minutes in the API.
# 0 (default) = disabled; evaluator_threshold / evaluator_max_retries apply directly.
autonomy_budget:
  env_var: TAO_AUTONOMY_BUDGET
  default: 0
  module:  app/server/budget.py
  # NOTE: anchors only set the GENERATOR model. Generator is never an
  # opus-allowed role per the model-routing policy. Higher budget tiers
  # therefore lift retries + threshold + timeout, NOT the model.
  anchors:
    - {minutes:  10, eval_threshold: 7.5, max_retries: 1, model: haiku,  timeout_min:   8}
    - {minutes:  30, eval_threshold: 8.5, max_retries: 2, model: sonnet, timeout_min:  25}
    - {minutes:  60, eval_threshold: 9.0, max_retries: 3, model: sonnet, timeout_min:  50}
    - {minutes: 120, eval_threshold: 9.0, max_retries: 4, model: sonnet, timeout_min: 100}
    - {minutes: 240, eval_threshold: 9.5, max_retries: 5, model: sonnet, timeout_min: 200}

staleness:
  # RA-580: harness docs regeneration policy
  max_age_days: 2
  watchdog_enabled: true
  watchdog_fires: "Medium Linear ticket if .harness/ docs are >48h stale"
