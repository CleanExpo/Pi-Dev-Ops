<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <rect x="5" y="5" width="17" height="17" rx="2.5" fill="rgba(0,0,0,0.35)" transform="translate(1.5,1.5)"/>
  <rect x="26" y="5" width="17" height="17" rx="2.5" fill="rgba(0,0,0,0.35)" transform="translate(1.5,1.5)"/>
  <rect x="5" y="26" width="17" height="17" rx="2.5" fill="rgba(0,0,0,0.35)" transform="translate(1.5,1.5)"/>
  <rect x="26" y="26" width="17" height="17" rx="2.5" fill="rgba(0,0,0,0.35)" transform="translate(1.5,1.5)"/>
  <!-- Main squares -->
  <rect x="5" y="5" width="17" height="17" rx="2.5" fill="url(#gridGrad)"/>
  <rect x="26" y="5" width="17" height="17" rx="2.5" fill="url(#gridGrad)"/>
  <rect x="5" y="26" width="17" height="17" rx="2.5" fill="url(#gridGrad)"/>
  <rect x="26" y="26" width="17" height="17" rx="2.5" fill="url(#gridGrad)"/>
  <!-- Highlight top-left square -->
  <rect x="5" y="5" width="10" height="9" rx="2" fill="rgba(255,255,255,0.18)"/>
  <!-- Highlight top-right square -->
  <rect x="26" y="5" width="10" height="9" rx="2" fill="rgba(255,255,255,0.12)"/>
</svg>
