name: Deploy

on:
  push:
    branches: [main, develop]

env:
  NODE_VERSION: '22'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

# Default least-privilege permissions; jobs override at job level when needed.
permissions: read-all

jobs:
  # -------------------------------------------------------
  # Test gate — must pass before any deploy
  # -------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
          DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
      - name: Type check
        run: npm run type-check
      - name: Lint
        run: npm run lint
      - name: Media asset gate
        run: npm run media:check
      - name: Unit tests
        run: npm test -- --passWithNoTests --forceExit

  # -------------------------------------------------------
  # Deploy to staging (develop branch)
  # -------------------------------------------------------
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      pull-requests: write # Required: github-script createComment for staging URL
    environment:
      name: staging
      url: https://staging.synthex.social
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Pull Vercel Environment
        run: vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
      - name: Comment on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Staging deployment ready: ${{ steps.deploy.outputs.url }}'
            })

  # -------------------------------------------------------
  # Deploy to production (main branch)
  # -------------------------------------------------------
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
    environment:
      name: production
      url: https://synthex.social
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Notify Slack
        if: always() && env.SLACK_WEBHOOK_URL != ''
        run: |
          STATUS="${{ job.status }}"
          COLOR=$( [ "$STATUS" = "success" ] && echo "good" || echo "danger" )
          curl -s -X POST "$SLACK_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"attachments\":[{\"text\":\"Production deployment ${STATUS} for ${{ github.sha }}\",\"color\":\"${COLOR}\"}]}" || true

  # -------------------------------------------------------
  # Post-deploy: Lighthouse performance test
  # -------------------------------------------------------
  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install @lhci/cli
        run: npm install -g @lhci/cli@0.14.x
      - name: Collect Lighthouse reports
        timeout-minutes: 10
        run: |
          lhci collect \
            --url="https://synthex.social/" \
            --url="https://synthex.social/login" \
            --url="https://synthex.social/dashboard" \
            --numberOfRuns=1 \
            --settings.chromeFlags="--no-sandbox --disable-dev-shm-usage --headless=new"
        continue-on-error: true
      - name: Assert performance budgets
        run: lhci assert --config=lighthouserc.cjs || true
      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deploy-lighthouse-results-${{ github.run_id }}
          path: .lighthouseci/
          retention-days: 30
          include-hidden-files: true
