name: Linear Dependency Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Default least-privilege permissions; jobs override at job level when needed.
permissions: read-all

jobs:
  check-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Extract SYN issue ID
        id: extract
        env:
          BRANCH: ${{ github.head_ref }}
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          SYN_ID=$(echo "$BRANCH $TITLE" | grep -oP 'SYN-\d+' | head -1 || true)
          echo "syn_id=$SYN_ID" >> $GITHUB_OUTPUT
          echo "Found SYN ID: $SYN_ID"

      - name: Check Linear blockers
        if: steps.extract.outputs.syn_id != ''
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          SYN_ID: ${{ steps.extract.outputs.syn_id }}
        run: |
          # Query Linear GraphQL for blockers
          RESPONSE=$(curl -s --max-time 10 \
            -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"{ issue(id: \\\"$SYN_ID\\\") { id title state { name } relations(filter: { type: { eq: \\\"blocks\\\" } }) { nodes { relatedIssue { id identifier title state { name } } } } } }\"}" \
          ) || { echo "LINEAR_TIMEOUT: Defaulting to PASS"; exit 0; }

          echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          issue = data.get('data', {}).get('issue')
          if not issue:
              print('Issue not found in Linear — PASS')
              sys.exit(0)
          blockers = issue.get('relations', {}).get('nodes', [])
          failed = []
          for rel in blockers:
              related = rel.get('relatedIssue', {})
              state = related.get('state', {}).get('name', '')
              if state.lower() not in ('done', 'cancelled'):
                  failed.append(f\"{related.get('identifier')} ({related.get('title')}) — {state}\")
          if failed:
              print('BLOCKED by incomplete issues:')
              for f in failed:
                  print(f'  - {f}')
              sys.exit(1)
          else:
              print('All blockers resolved — PASS')
          "

      - name: No SYN ID found
        if: steps.extract.outputs.syn_id == ''
        run: echo "No SYN issue ID found in branch/title — skipping dependency check (PASS)"

  # SYN-755: Innovation Hypothesis compliance check (soft warning)
  # Fires on PRs that add or modify innovation decision memos under
  # board-cron/decisions/innovation-*.md. Verifies the PR description
  # references the hypothesis template. Never blocks merge — mirrors the
  # journey-moment-stale-check and client-value-stale-check patterns.
  innovation-hypothesis-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect innovation memo changes
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '^board-cron/decisions/innovation-.*\.md$' || true)
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Innovation memo(s) touched:"
            echo "$CHANGED"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No innovation decision memos touched — skipping hypothesis check."
          fi

      - name: Check bypass label
        id: bypass
        if: steps.detect.outputs.changed == 'true'
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -q 'ci:hypothesis-exempt'; then
            echo "bypass=true" >> $GITHUB_OUTPUT
            echo "::warning::PR bypasses innovation-hypothesis-check via ci:hypothesis-exempt label. This bypass will be appended to board-cron/logs/innovation-hypothesis-compliance.jsonl on next board-cron rotation."
          else
            echo "bypass=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify hypothesis template reference
        if: steps.detect.outputs.changed == 'true' && steps.bypass.outputs.bypass != 'true'
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          if echo "$BODY" | grep -qE 'board-cron/templates/innovation-hypothesis'; then
            echo "✓ PR description references the innovation hypothesis template."
          else
            echo "::warning::PR touches innovation decision memo(s) but the PR description does not reference 'board-cron/templates/innovation-hypothesis'. Please link the template or add the 'ci:hypothesis-exempt' label if this is a retroactive/pre-template decision. See SYN-755."
          fi
