<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="videoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
  </defs>
  <!-- Shadow camera body -->
  <rect x="4" y="14" width="28" height="20" rx="3" fill="rgba(0,0,0,0.35)" transform="translate(1.5,1.5)"/>
  <!-- Shadow video lens triangle -->
  <polygon points="32,16 44,10 44,38 32,32" fill="rgba(0,0,0,0.35)" transform="translate(1.5,1.5)"/>
  <!-- Camera body -->
  <rect x="4" y="14" width="28" height="20" rx="3" fill="url(#videoGrad)"/>
  <!-- Video lens (triangle notch) -->
  <polygon points="32,16 44,10 44,38 32,32" fill="url(#videoGrad)" opacity="0.8"/>
  <!-- Lens circle -->
  <circle cx="16" cy="24" r="6" fill="rgba(0,0,0,0.2)"/>
  <circle cx="16" cy="24" r="4" fill="rgba(0,0,0,0.25)"/>
  <!-- Lens shine -->
  <circle cx="14" cy="22" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <!-- Highlight on camera body -->
  <rect x="4" y="14" width="18" height="8" rx="3" fill="rgba(255,255,255,0.18)"/>
</svg>
