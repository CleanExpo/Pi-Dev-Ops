name: Brand Intelligence Pipeline

on:
  # 6-hour schedule: 00:00, 06:00, 12:00, 18:00 UTC
  schedule:
    - cron: '0 0,6,12,18 * * *'

  # Manual trigger for on-demand runs and dry-run validation
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pipeline mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - discovery
          - enforce
          - refresh
          - onboarding
      dry_run:
        description: 'Dry run (validate without API calls)'
        required: false
        default: 'false'
        type: boolean

# Never cancel a pipeline run in progress — data integrity matters more than queue latency
concurrency:
  group: brand-intelligence-pipeline
  cancel-in-progress: false

# Default least-privilege permissions; jobs override at job level when needed.
permissions: read-all

jobs:
  run-pipeline:
    name: Brand Intelligence (${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode || 'cron-auto' }})
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: brand-intelligence/pyproject.toml

      # Playwright Chromium requires these system libs on Ubuntu
      - name: Install Playwright system dependencies
        run: |
          sudo apt-get install -y --no-install-recommends \
            libnss3 libnspr4 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2 libpango-1.0-0 libcairo2

      - name: Install pipeline Python dependencies
        working-directory: brand-intelligence
        run: |
          pip install -e .
          python -m playwright install chromium

      - name: Run brand intelligence pipeline
        working-directory: brand-intelligence
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python synthex_orchestrator.py --dry-run --verbose
          else
            MODE="${{ github.event.inputs.mode || 'full' }}"
            python synthex_orchestrator.py --mode "${MODE}" --cron --verbose
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SYNTHEX_PIPELINE_SLACK_WEBHOOK }}
          PIPELINE_ENV: github-actions

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SYNTHEX_PIPELINE_SLACK_WEBHOOK }}
        run: |
          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            curl -s -X POST "${SLACK_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -d "{
                \"text\": \"⚠️ Brand Intelligence Pipeline *FAILED*\\nRun: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>\\nBranch: \`${{ github.ref_name }}\`\"
              }" || true
          fi

      - name: Upload run logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: brand-intelligence/logs/
          retention-days: 30

      - name: Run health check
        if: success()
        working-directory: brand-intelligence
        run: |
          bash monitoring/healthcheck.sh --json || true
