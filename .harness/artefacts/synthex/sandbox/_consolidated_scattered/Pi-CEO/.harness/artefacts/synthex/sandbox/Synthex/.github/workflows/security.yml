name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: '0 8 * * 1'

# Default least-privilege permissions; jobs override at job level when needed.
permissions: read-all

jobs:
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Run npm audit (critical only)
        run: npm audit --audit-level=critical --omit=dev

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # continue-on-error: Dependency Graph is not yet enabled on this repo.
    # Enable at: https://github.com/CleanExpo/Synthex/settings/security_analysis
    # Remove continue-on-error once the feature is enabled.
    continue-on-error: true
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

  snyk-scan:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@v1.0.0
        continue-on-error: true # Change to false once SNYK_TOKEN is in repo secrets
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          skip-dirs: 'node_modules,.next,dist,build'
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
