<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="feat-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
  </defs>
  <!-- outer track shadow -->
  <circle cx="25.5" cy="25.5" r="16" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="4"/>
  <!-- outer track -->
  <circle cx="24" cy="24" r="16" fill="none" stroke="rgba(249,115,22,0.2)" stroke-width="4"/>
