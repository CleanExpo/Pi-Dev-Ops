<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="searchNavGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <!-- Shadow circle + handle -->
  <circle cx="21" cy="21" r="14" fill="rgba(0,0,0,0.35)" transform="translate(1.5,1.5)"/>
  <line x1="31" y1="31" x2="42" y2="42" stroke="rgba(0,0,0,0.35)" stroke-width="4" stroke-linecap="round" transform="translate(1.5,1.5)"/>
  <!-- Main circle -->
  <circle cx="21" cy="21" r="14" fill="url(#searchNavGrad)"/>
  <!-- Inner circle hollow -->
  <circle cx="21" cy="21" r="10" fill="rgba(255,255,255,0.08)"/>
  <!-- Handle -->
  <line x1="31" y1="31" x2="42" y2="42" stroke="url(#searchNavGrad)" stroke-width="4" stroke-linecap="round"/>
  <!-- Highlight on lens -->
  <ellipse cx="15" cy="14" rx="6" ry="4" fill="rgba(255,255,255,0.22)"/>
</svg>
