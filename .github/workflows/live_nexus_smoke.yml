name: Live Nexus Smoke (production)

on:
  schedule:
    # Every 2 hours, offset from the main Pi-CEO smoke jobs.
    - cron: "20 */2 * * *"
  workflow_dispatch:
    inputs:
      target_url:
        description: "Live Nexus URL to smoke"
        required: false
        default: "https://live.unite-group.ink"
      include_save:
        description: "Also run /api/save and create a Drive smoke file"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: live-nexus

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.8
        with:
          version: "10.33.0"
          run_install: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: live-nexus/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Live Nexus production smoke
        env:
          LIVE_NEXUS_URL: ${{ github.event.inputs.target_url || 'https://live.unite-group.ink' }}
          LIVE_NEXUS_SMOKE_SAVE: ${{ github.event.inputs.include_save == 'true' && '1' || '0' }}
        run: |
          pnpm smoke:prod | tee live-nexus-smoke.txt

      - name: Write smoke summary
        if: always()
        run: |
          {
            echo "# Live Nexus Production Smoke"
            echo ""
            if [ -f live-nexus-smoke.txt ]; then
              echo '```'
              cat live-nexus-smoke.txt
              echo '```'
            else
              echo "No smoke output captured."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
