name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Pi CEO API smoke test (28 checks)
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      TAO_PASSWORD: ${{ secrets.TAO_PASSWORD || 'ci-smoke-test-password' }}
      TAO_SESSION_SECRET: ci-session-secret-fixed-for-test
      TAO_EVALUATOR_ENABLED: "false"
      TAO_GC_MAX_AGE: "3600"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Verify server can be imported
        working-directory: app
        run: |
          python - <<'PYEOF'
          import sys
          print('Python:', sys.version)
          print('CWD path[0]:', sys.path[0] if sys.path else 'empty')
          import server.main
          print('server.main import: OK')
          PYEOF

      - name: Start Pi CEO server
        run: |
          # Run from app/ dir with full logging captured
          python -m uvicorn server.main:app \
            --host 127.0.0.1 --port 7777 \
            --log-level info > /tmp/server.log 2>&1 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
        working-directory: app

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:7777/health 2>/dev/null || echo "000")
            echo "[${i}s] health status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "=== SERVER STARTUP LOG ==="
          cat /tmp/server.log
          echo "==========================="
          exit 1

      - name: Run smoke test
        run: |
          python scripts/smoke_test.py \
            --url http://127.0.0.1:7777 \
            --password "$TAO_PASSWORD"

      - name: Show server log on failure
        if: failure()
        run: cat /tmp/server.log || true

      - name: Stop server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true
