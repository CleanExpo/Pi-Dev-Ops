name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Pi CEO API smoke test (28 checks)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      TAO_PASSWORD: ${{ secrets.TAO_PASSWORD || 'ci-smoke-test-password' }}
      TAO_SESSION_SECRET: ci-session-secret-fixed-for-test
      TAO_EVALUATOR_ENABLED: "false"   # skip real claude runs in CI
      TAO_GC_MAX_AGE: "3600"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Start Pi CEO server
        run: |
          # Write server logs to file so failures are visible in CI
          cd app
          python -m uvicorn server.main:app \
            --host 127.0.0.1 --port 7777 \
            --log-level info > /tmp/server.log 2>&1 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 25); do
            if curl -sf http://127.0.0.1:7777/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "=== SERVER STARTUP LOG ==="
          cat /tmp/server.log || true
          echo "==========================="
          echo "Server failed to start after 25s"
          exit 1

      - name: Run smoke test
        run: |
          python scripts/smoke_test.py \
            --url http://127.0.0.1:7777 \
            --password "$TAO_PASSWORD"

      - name: Show server log on failure
        if: failure()
        run: cat /tmp/server.log || true

      - name: Stop server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true
