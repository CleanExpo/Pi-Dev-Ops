name: Codebase Wiki

# RA-1968 — refresh per-directory WIKI.md after each merge to main.
# Cost-budget guard caps per-merge spend at ~$0.05 (slightly above the
# per-directory budget of $0.02, allowing a few directories per merge).

on:
  push:
    branches: [main]

concurrency:
  group: codebase-wiki
  cancel-in-progress: true

jobs:
  update-wiki:
    if: github.repository == 'CleanExpo/Pi-Dev-Ops'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    env:
      TAO_MAX_COST_USD: "0.05"
      TAO_HARD_STOP_FILE: "/tmp/never-exists"
      WIKI_BOT_TOKEN: ${{ secrets.WIKI_BOT_TOKEN }}

    steps:
      - name: Checkout with wiki bot token
        id: wiki_bot_checkout
        if: env.WIKI_BOT_TOKEN != ''
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # RA-1999 — main branch protection (4 required status checks) rejects
          # pushes signed by GITHUB_TOKEN with `GH006: Protected branch update
          # failed`. Use a fine-grained PAT scoped to this repo only with
          # `Contents: Read and write` plus branch-protection-bypass admin.
          token: ${{ env.WIKI_BOT_TOKEN }}

      - name: Checkout with default token
        if: env.WIKI_BOT_TOKEN == '' || steps.wiki_bot_checkout.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # WIKI_BOT_TOKEN is optional. Without it, checkout must use the
          # action's built-in github.token default; overriding token with an
          # empty fallback breaks private-repo fetch before the wiki updater
          # can run. If WIKI_BOT_TOKEN exists but has expired or lacks read
          # access, this step still lets the updater run; the later protected-
          # branch push may still be blocked.

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        # RA-5700 — the default pip retry budget (3 retries, 15 s read timeout)
        # is too small for the intermittent pypi.org ReadTimeoutError that has
        # failed this job on main (run 27332720919: "No matching distribution
        # found for httpcore==1.*" after three 15 s timeouts fetching httpcore).
        # Widen the network budget and refresh pip so a transient index blip no
        # longer red-X's the post-merge wiki refresh.
        env:
          PIP_RETRIES: "5"
          PIP_DEFAULT_TIMEOUT: "60"
        run: |
          python -m pip install --upgrade pip
          pip install --retries 5 --timeout 60 -r app/requirements.txt

      - name: Compute previous merge SHA
        id: prev
        run: |
          PREV=$(git log -2 --format=%H | tail -1)
          echo "sha=$PREV" >> "$GITHUB_OUTPUT"

      - name: Run codebase wiki updater
        run: |
          python scripts/run_codebase_wiki.py --since="${{ steps.prev.outputs.sha }}"

      - name: Commit WIKI.md refresh to main
        # Preferred path: push the [skip ci] wiki refresh straight to main using
        # WIKI_BOT_TOKEN, whose branch-protection bypass lets the commit land
        # without waiting on required status checks that a [skip ci] commit can
        # never report (the old PR flow left every refresh permanently BLOCKED,
        # forcing a human admin-bypass merge). [skip ci] also stops this push
        # from retriggering the Codebase Wiki workflow, so there is no loop.
        # Fallback (no/expired bot token, or main advanced mid-job): open a PR,
        # exactly as before, as a safety net that a human can merge.
        env:
          GH_TOKEN: ${{ github.token }}
          BOT_TOKEN: ${{ env.WIKI_BOT_TOKEN }}
          WIKI_BRANCH: tao/codebase-wiki-refresh
        run: |
          if git diff --quiet -- ':(glob)**/WIKI.md'; then
            echo "No WIKI.md changes."
            exit 0
          fi

          git config user.name "tao-codebase-wiki"
          git config user.email "noreply@unite-group.dev"
          git add -- ':(glob)**/WIKI.md'
          git commit -m "docs(wiki): refresh per-directory WIKI.md [skip ci]"

          if [ -n "$BOT_TOKEN" ] && \
             git push "https://x-access-token:${BOT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main; then
            echo "Wiki refresh pushed directly to main via WIKI_BOT_TOKEN bypass."
            exit 0
          fi

          echo "::warning::Direct push unavailable (no/expired WIKI_BOT_TOKEN or main advanced) — falling back to PR."
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            HEAD:"$WIKI_BRANCH" --force

          existing_pr="$(gh pr list \
            --head "$WIKI_BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // ""')"

          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" \
              --title "docs(wiki): refresh per-directory WIKI.md" \
              --body "Automated Codebase Wiki refresh after main changed (bot direct-push unavailable — needs manual merge)." \
              || echo "::warning::Unable to update existing Codebase Wiki PR. Branch pushed: https://github.com/${GITHUB_REPOSITORY}/tree/${WIKI_BRANCH}"
          else
            gh pr create \
              --base main \
              --head "$WIKI_BRANCH" \
              --title "docs(wiki): refresh per-directory WIKI.md" \
              --body "Automated Codebase Wiki refresh after main changed (bot direct-push unavailable — needs manual merge)." \
              || echo "::warning::GitHub token cannot create Codebase Wiki PR. Branch pushed: https://github.com/${GITHUB_REPOSITORY}/tree/${WIKI_BRANCH}"
          fi
