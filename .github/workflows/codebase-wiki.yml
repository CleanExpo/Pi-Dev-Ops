name: Codebase Wiki

# RA-1968 — refresh per-directory WIKI.md after each merge to main.
# Cost-budget guard caps per-merge spend at ~$0.05 (slightly above the
# per-directory budget of $0.02, allowing a few directories per merge).

on:
  push:
    branches: [main]

concurrency:
  group: codebase-wiki
  cancel-in-progress: true

jobs:
  update-wiki:
    if: github.repository == 'CleanExpo/Pi-Dev-Ops'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    env:
      TAO_MAX_COST_USD: "0.05"
      TAO_HARD_STOP_FILE: "/tmp/never-exists"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt

      - name: Compute previous merge SHA
        id: prev
        run: |
          PREV=$(git log -2 --format=%H | tail -1)
          echo "sha=$PREV" >> "$GITHUB_OUTPUT"

      - name: Run codebase wiki updater
        run: |
          python scripts/run_codebase_wiki.py --since="${{ steps.prev.outputs.sha }}"

      - name: Commit WIKI.md changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(wiki): refresh per-directory WIKI.md [skip ci]"
          file_pattern: "**/WIKI.md"
          commit_user_name: "tao-codebase-wiki"
          commit_user_email: "noreply@unite-group.dev"
