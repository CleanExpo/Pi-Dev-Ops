name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python: unit tests + ruff lint ──────────────────────────────────────────
  python:
    name: Python (pytest + ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TAO_PASSWORD: ci-test-password
      TAO_SESSION_SECRET: ci-session-secret-fixed-for-test
      TAO_EVALUATOR_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install "ruff==0.15.10" "pytest>=8"

      - name: Ruff lint
        run: ruff check app/ --output-format=github

      - name: Pytest unit tests
        run: pytest tests/ -v --tb=short
        working-directory: .

  # ── Frontend: TypeScript + ESLint + build ────────────────────────────────────
  frontend:
    name: Frontend (tsc + eslint + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint
        continue-on-error: false

      - name: Build
        run: npm run build
        env:
          # Stub required env vars for build validation
          PI_CEO_URL: http://127.0.0.1:7777
          PI_CEO_PASSWORD: ci-build-stub
          NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-key

  # ── Secrets exposure scan (runs on every push + PR, blocks merge) ──────────
  secrets-scan:
    name: Secrets exposure scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          # Full history so git ls-files works correctly
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run secrets_check.py
        run: python scripts/secrets_check.py --repo-root .
        # No LINEAR_API_KEY / TELEGRAM_BOT_TOKEN in CI — alerts fire in local + prod only.
        # A non-zero exit code from secrets_check.py fails the job and blocks the merge.

  # ── RA-583: Post-deploy smoke test against production Railway URL ──────────
  # Runs only on pushes to main (not PRs) after both python + frontend jobs pass.
  # Requires TAO_PROD_PASSWORD secret set in GitHub → Settings → Secrets.
  smoke-prod:
    name: Smoke test (prod)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: [python, frontend, secrets-scan]
    # Only fire on pushes to main — not on PRs (we don't smoke prod on every PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps for smoke test
        run: pip install requests

      - name: Wait for Railway deploy to settle
        # CI jobs take ~44s before this runs; Railway deploy needs ~60-90s total.
        # 60s here + 44s CI overhead = ~104s total settle time.
        run: sleep 60

      - name: Run smoke test against production
        run: python scripts/smoke_test.py --target=prod --emit-metrics
        env:
          TAO_PASSWORD: ${{ secrets.TAO_PROD_PASSWORD }}

      - name: Upload smoke test metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-metrics
          path: .harness/post-deploy-metrics/
          if-no-files-found: ignore

  # ── RA-6503: Local smoke test in CI (every PR + push to main) ─────────────
  # Starts the server locally with a dummy TAO_PASSWORD and runs
  # scripts/smoke_test.py against it. Does NOT hit production.
  # Runs on every PR so smoke regressions are caught before merge.
  # Excluded checks (see PR body for full rationale):
  #   --agent-sdk checks  — require ANTHROPIC_API_KEY secret, not set in PR CI
  #   --emit-metrics      — post-deploy metric files not meaningful in PR runs
  smoke-local:
    name: Smoke test (local server, RA-6503)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [python]

    env:
      TAO_PASSWORD: ci-smoke-local-dummy-password
      TAO_SESSION_SECRET: ci-session-secret-fixed-for-test
      TAO_EVALUATOR_ENABLED: "false"
      TAO_GC_MAX_AGE: "3600"
      TAO_SWARM_ENABLED: "0"
      TAO_AUTONOMY_ENABLED: "0"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Start Pi CEO server locally
        run: |
          python -m uvicorn app.server.main:app \
            --host 127.0.0.1 --port 7777 \
            --log-level warning > /tmp/server-local.log 2>&1 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:7777/health 2>/dev/null || echo "000")
            echo "[${i}s] health status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "=== SERVER STARTUP LOG ==="
          cat /tmp/server-local.log
          echo "=========================="
          exit 1

      - name: Run smoke test against local server
        # --agent-sdk excluded: requires ANTHROPIC_API_KEY (not set in PR CI)
        # --emit-metrics excluded: post-deploy metrics not meaningful here
        run: |
          python scripts/smoke_test.py \
            --url http://127.0.0.1:7777 \
            --password "$TAO_PASSWORD"

      - name: Show server log on failure
        if: failure()
        run: cat /tmp/server-local.log || true

      - name: Stop server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true
